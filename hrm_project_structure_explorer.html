*{box-sizing:border-box;margin:0;padding:0}
.root{display:flex;gap:0;min-height:520px;font-size:13px}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--color-border-tertiary);padding:12px 0}
.tab{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;color:var(--color-text-secondary);border-left:3px solid transparent;transition:all .15s}
.tab:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.tab.active{border-left-color:#185FA5;background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.content{flex:1;padding:20px;overflow:auto}
.tree{font-family:var(--font-mono);font-size:12.5px;line-height:1.85}
.tree .folder{color:var(--color-text-primary);font-weight:500}
.tree .file{color:var(--color-text-secondary)}
.tree .comment{color:#639922;font-style:italic}
.tree .indent1{padding-left:20px}
.tree .indent2{padding-left:40px}
.tree .indent3{padding-left:60px}
.tree .indent4{padding-left:80px}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500;margin-left:6px;vertical-align:middle}
.b-blue{background:#E6F1FB;color:#0C447C}
.b-green{background:#EAF3DE;color:#27500A}
.b-amber{background:#FAEEDA;color:#633806}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-coral{background:#FAECE7;color:#712B13}
.section-head{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;padding:14px 16px 4px;text-transform:uppercase}
.panel-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.panel-sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:16px}
@media(prefers-color-scheme:dark){.b-blue{background:#0C447C;color:#B5D4F4}.b-green{background:#27500A;color:#C0DD97}.b-amber{background:#633806;color:#FAC775}.b-purple{background:#3C3489;color:#CECBF6}.b-coral{background:#712B13;color:#F5C4B3}}
</style>
